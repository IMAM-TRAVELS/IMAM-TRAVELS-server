<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Welcome Back</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" class="logo-circle" type="image/x-icon" href="imam_travel_and_tours_logo.jpeg">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <h2>Welcome Back!!</h2>
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <i class="fa fa-user"></i>
                    <input type="text" id="login_user" placeholder="username" autocomplete="username" required>
                </div>
                <div class="input-group">
                    <i class="fa fa-key"></i>
                    <input type="password" id="login_pass" placeholder="......" autocomplete="current-password" autocomplete="current-password" required>
                </div>
                <div class="input-group">
                    <i class="fa fa-user-circle"></i>
                    <input type="text" id="login_company" placeholder="Company Id" required>
                </div>
                <button type="submit" class="login-btn">LOGIN</button>
            </form>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner-box">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Verifying Credentials...</p>
        </div>
    </div>

    <!-- Firebase scripts ko replace karein (Compat version use karein) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <!-- Aapki apni script file -->
    <script type="module" src="script.js"></script>
</body>
</html>
